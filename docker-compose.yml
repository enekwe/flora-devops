version: '3.8'

services:
  flora-devops:
    build: .
    container_name: flora-devops
    restart: unless-stopped
    ports:
      - "4003:4003"
    environment:
      - NODE_ENV=production
      - PORT=4003
      - MONGODB_URI=${MONGODB_URI}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_CALLBACK_URL=${GITHUB_CALLBACK_URL}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - VERCEL_CLIENT_ID=${VERCEL_CLIENT_ID}
      - VERCEL_CLIENT_SECRET=${VERCEL_CLIENT_SECRET}
      - VERCEL_CALLBACK_URL=${VERCEL_CALLBACK_URL}
    volumes:
      - ./logs:/app/logs
    networks:
      - flora-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4003/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  flora-network:
    external: true
